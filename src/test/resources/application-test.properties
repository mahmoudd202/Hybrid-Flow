# ===============================
# DATABASE - PostgreSQL Test Instance
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/hybrid_flow_test
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# MAIL — disable auto-configuration so no SMTP connection is attempted
# ===============================
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# ===============================
# JWT — must match the main secret so JwtService initialises without error
# ===============================
jwt.secret=a-string-secret-at-least-256-bits-lone
jwt.access-token-expiration=86400000

# ===============================
# OAuth2 — placeholder values kept so SecurityConfig wires up without error
# ===============================
spring.security.oauth2.client.registration.github.client-id=test-github-client-id
spring.security.oauth2.client.registration.github.client-secret=test-github-client-secret
spring.security.oauth2.client.registration.github.scope=user:email

spring.security.oauth2.client.registration.google.client-id=test-google-client-id
spring.security.oauth2.client.registration.google.client-secret=test-google-client-secret
